name: Update feeds

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: write

concurrency:
  group: update-feeds
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch feeds
        run: python scripts/fetch_feeds.py --media scripts/media.json --out feeds.json

      - name: Commit feeds.json
        run: |
          git config user.name  "feeds-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.json
          if git diff --quiet --cached; then
            echo "no change"
          else
            git commit -m "chore: update feeds.json"
            git push
          fi
